<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lulu & Co</title>
  <link href="./styles/output.css" rel="stylesheet">

  <!-- Font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <!-- Google 'Karla' font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=League+Spartan:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
</head>

<body class="min-h-screen font-[Karla] text-[18px] overflow-x-hidden">
  <!-- Header -->
  <div class="bg-[#FF6D91] sticky top-0 z-52">
    <div id="main-header-container">
    </div>
  </div>

  <main>
    <!-- Master wrapper -->
    <div class="w-full md:max-w-432 md:mx-auto px-4 md:px-30">

      <!-- Product Detail -->
      <section id="product-detail" class="mt-8 px-10">

      </section>

      <!-- Crumbs -->
      <section class="mt-18">
        <div class="flex flex-col items-center justify-center gap-2 mb-12 mt-16 md:mt-18">
          <h4 class="text-[#C92B5D] italic md:text-xl font-semibold">You may also love these ...</h4>
          <h3 class="text-[#09346d] font-[League_Spartan] font-semibold text-3xl md:text-5xl text-center md:text-left">
            Complete your order</h3>
          <p class="text-center text-gray-500 mt-3 text-sm md:text-base max-w-md">
            Each treat is crafted with Peruvian superfoods.
          </p>
        </div>

        <div id="related-products-container" class="grid grid-cols-1 md:grid-cols-12 gap-5 md:px-10">
        </div>
      </section>

    </div>
  </main>

  <footer class="mt-30 text-white">
    <div id="main-footer-container">
    </div>
  </footer>
</body>
<script type="module" src="./js/product.js"></script>

</html>
