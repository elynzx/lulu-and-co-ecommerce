<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lulu & Co</title>
  <link href="./styles/output.css" rel="stylesheet">

  <!-- Font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <!-- Google 'Karla' font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=League+Spartan:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
</head>


<body class="min-h-screen font-[Karla] text-[18px] overflow-x-hidden">

  <!-- Header -->
  <div class=" bg-[#FF6D91] sticky top-0 z-52">
    <div id="main-header-container">
    </div>
  </div>

  <main>
    <!-- Master wrapper -->
    <div class="w-full md:max-w-432 md:mx-auto px-4 md:px-30">

      <!-- Cart Section -->
      <section id="cart-section" class="py-22">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-5">
          <!-- Cart Table -->
          <div class="col-span-1 md:col-span-8 flex flex-col">
            <div class="flex flex-col gap-3 md:gap-7 justify-center items-center">
              <h3
                class="text-[#C92B5D] font-[League_Spartan] font-semibold text-2xl md:text-5xl text-center md:text-left">
                Shopping Cart</h3>
              <p class="text-center text-[16px] md:text-md md:w-xl">Review your order below before checkout.</p>
            </div>

            <div class="w-full mt-10 overflow-auto">
              <table class="min-w-full bg-white text-sm">
                <thead class="hidden md:table-header-group">
                  <tr class="border-b bortder-gray-300 text-[#09346d]">
                    <th class="py-3 px-4 text-left font-semibold">Product</th>
                    <th class="py-3 px-4 text-center font-semibold">Quantity</th>
                    <th class="py-3 px-4 text-center font-semibold">Price</th>
                    <th class="py-3 px-4 text-center font-semibold">Subtotal</th>
                  </tr>
                </thead>
                <tbody id="cart-table-body">
                </tbody>
              </table>
            </div>

            <div class="h-32 md:hidden"></div>
          </div>

          <!-- Cart summary-->
          <div id="order-summary-container"
            class="hidden md:flex col-span-1 md:col-span-4 flex-col items-center md:items-end md:h-full px-2 md:px-10">
          </div>

        </div>
      </section>

    </div>
  </main>

  <footer class="mt-30 text-white">
    <div id="main-footer-container">
    </div>
  </footer>

  <!-- Mobile summary modal -->
  <div id="mobile-summary-container"
    class="hidden md:hidden fixed bottom-0 left-0 right-0 z-50 bg-white shadow-[0_-4px_24px_rgba(0,0,0,0.12)] transition-transform duration-300">
  </div>

</body>
<script type="module" src="./js/index.js"></script>

</html>
